spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/task_db
    username: task_user
    password: 123456

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml