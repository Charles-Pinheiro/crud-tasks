databaseChangeLog:
  - changeSet:
      id: 003-add-user-id-to-task
      author: charles
      changes:
        - addColumn:
            tableName: task
            columns:
              - column:
                  name: user_id
                  type: BIGINT
        - createIndex:
            tableName: task
            indexName: task_user_idIDX
            columns:
